<svg width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; fill: #1a1a1a; }
      .th { font-size: 14px; font-weight: 600; }
      .ts { font-size: 12px; font-weight: 400; fill: #444; }

      /* Gray - Client */
      .c-gray rect  { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray .th   { fill: #2C2C2A; }
      .c-gray .ts   { fill: #5F5E5A; }

      /* Purple - API Layer */
      .c-purple rect  { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th   { fill: #26215C; }
      .c-purple .ts   { fill: #534AB7; }

      /* Teal - Application Layer */
      .c-teal rect  { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal .th   { fill: #04342C; }
      .c-teal .ts   { fill: #0F6E56; }

      /* Blue - Infrastructure Layer */
      .c-blue rect  { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue .th   { fill: #042C53; }
      .c-blue .ts   { fill: #185FA5; }

      /* Arrows */
      .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <!-- ── Client ── -->
  <g class="c-gray">
    <rect x="260" y="24" width="160" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="44" text-anchor="middle" dominant-baseline="central">Client</text>
    <text class="ts" x="340" y="62" text-anchor="middle" dominant-baseline="central">HTTPS + JWT Bearer</text>
  </g>

  <!-- Client → API layer arrow -->
  <line x1="340" y1="72" x2="340" y2="108" class="arr" marker-end="url(#arrow)"/>

  <!-- ── API Layer container ── -->
  <g class="c-purple">
    <rect x="40" y="108" width="600" height="188" rx="14" stroke-width="0.5"/>
    <text class="th" x="64" y="132" dominant-baseline="central">API layer</text>
  </g>

  <!-- JWT Middleware box -->
  <g class="c-purple">
    <rect x="68" y="148" width="164" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="150" y="168" text-anchor="middle" dominant-baseline="central">JWT middleware</text>
    <text class="ts" x="150" y="188" text-anchor="middle" dominant-baseline="central">Validates token + expiry</text>
  </g>

  <!-- Tenant middleware box -->
  <g class="c-purple">
    <rect x="258" y="148" width="164" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="168" text-anchor="middle" dominant-baseline="central">Tenant middleware</text>
    <text class="ts" x="340" y="188" text-anchor="middle" dominant-baseline="central">Sets TenantId from claims</text>
  </g>

  <!-- RBAC box -->
  <g class="c-purple">
    <rect x="448" y="148" width="164" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="530" y="168" text-anchor="middle" dominant-baseline="central">RBAC check</text>
    <text class="ts" x="530" y="188" text-anchor="middle" dominant-baseline="central">Admin or Auditor role</text>
  </g>

  <!-- arrows inside API layer -->
  <line x1="232" y1="176" x2="256" y2="176" class="arr" marker-end="url(#arrow)"/>
  <line x1="422" y1="176" x2="446" y2="176" class="arr" marker-end="url(#arrow)"/>

  <!-- Controllers label -->
  <text class="ts" x="340" y="228" text-anchor="middle" dominant-baseline="central">POST /logs · GET /logs · GET /logs/{id} · POST /auth/login</text>

  <!-- API layer → Application layer arrow -->
  <line x1="340" y1="296" x2="340" y2="332" class="arr" marker-end="url(#arrow)"/>

  <!-- ── Application Layer container ── -->
  <g class="c-teal">
    <rect x="40" y="332" width="600" height="100" rx="14" stroke-width="0.5"/>
    <text class="th" x="64" y="356" dominant-baseline="central">Application layer</text>
  </g>

  <!-- LogService -->
  <g class="c-teal">
    <rect x="120" y="368" width="140" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="190" y="388" text-anchor="middle" dominant-baseline="central">LogService</text>
    <text class="ts" x="190" y="406" text-anchor="middle" dominant-baseline="central">Tenant-scoped logic</text>
  </g>

  <!-- AuthService -->
  <g class="c-teal">
    <rect x="420" y="368" width="140" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="490" y="388" text-anchor="middle" dominant-baseline="central">AuthService</text>
    <text class="ts" x="490" y="406" text-anchor="middle" dominant-baseline="central">JWT generation</text>
  </g>

  <!-- App → Infrastructure arrow -->
  <line x1="340" y1="432" x2="340" y2="468" class="arr" marker-end="url(#arrow)"/>

  <!-- ── Infrastructure Layer container ── -->
  <g class="c-blue">
    <rect x="40" y="468" width="600" height="92" rx="14" stroke-width="0.5"/>
    <text class="th" x="64" y="492" dominant-baseline="central">Infrastructure layer</text>
  </g>

  <!-- LogRepository -->
  <g class="c-blue">
    <rect x="90" y="504" width="148" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="164" y="522" text-anchor="middle" dominant-baseline="central">LogRepository</text>
    <text class="ts" x="164" y="538" text-anchor="middle" dominant-baseline="central">Reads + writes logs</text>
  </g>

  <!-- AppDbContext -->
  <g class="c-blue">
    <rect x="266" y="504" width="148" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="522" text-anchor="middle" dominant-baseline="central">AppDbContext</text>
    <text class="ts" x="340" y="538" text-anchor="middle" dominant-baseline="central">Global query filter</text>
  </g>

  <!-- UserRepository -->
  <g class="c-blue">
    <rect x="442" y="504" width="148" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="516" y="522" text-anchor="middle" dominant-baseline="central">UserRepository</text>
    <text class="ts" x="516" y="538" text-anchor="middle" dominant-baseline="central">Auth lookups</text>
  </g>

</svg>
